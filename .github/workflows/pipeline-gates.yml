name: pipeline-gates
on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools and project deps
        run: |
          pip install pytest mutmut
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f pyproject.toml ] && pip install -e . || true

      - name: Run pipeline gates (full)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GATE_PROVIDER: openrouter
        run: bash agentic_development/scripts/gate_ci.sh --full
